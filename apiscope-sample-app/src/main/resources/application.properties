server.port=8080

# ── LLM Provider ─────────────────────────────────────────────────────────────
# Uses local Ollama (requires ollama serve running on localhost:11434)
spring.profiles.active=ollama

# ── Agentic Docs ──────────────────────────────────────────────────────────────
# Enabled by default. Set to false to disable the RAG chat endpoint.
# apiscope.enabled=false

# Path to persist the vector store on disk between restarts.
# On first startup: embeddings are computed and saved here.
# On subsequent startups: embeddings are loaded from this file — no re-ingest needed.
# No extra database or infrastructure required.
apiscope.vector-store-path=./apiscope-vector-store.json

# Rate limiting: max requests per IP per minute on /apiscope/api/chat endpoints.
# Set enabled=false to disable (e.g. for internal-only or trusted-network deployments).
apiscope.rate-limit.enabled=true
apiscope.rate-limit.requests-per-minute=20

# ── Flow Tracer ───────────────────────────────────────────────────────────────
# Enables real-time AOP execution tracing + SSE streaming for the Flow Tracer UI tab.
# Off by default in production — enable explicitly here for development/demo.
apiscope.flow.enabled=true

# ── H2 In-Memory Database ────────────────────────────────────────────────────
# Schema is created by Hibernate (create-drop); seed data is loaded from data.sql.
spring.datasource.url=jdbc:h2:mem:sampledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Run data.sql AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# H2 browser console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.apiscope=INFO

# ── Actuator ─────────────────────────────────────────────────────────────────
# Expose only metrics (used by Agentic Docs UI for live response-time badges).
management.endpoints.web.exposure.include=metrics
management.endpoint.metrics.enabled=true
# Keep actuator on the main port so Agentic Docs proxy can reach it internally.
management.server.port=8080
