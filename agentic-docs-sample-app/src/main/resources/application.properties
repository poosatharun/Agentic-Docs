server.port=8080

# ── Agentic Docs ──────────────────────────────────────────────────────────────
agentic.docs.enabled=true

# ── Active LLM Profile ────────────────────────────────────────────────────────
# Switch between providers by changing this value:
#
#   openai  → Uses OpenAI API (gpt-4o-mini + text-embedding-3-small)
#             Requires: SPRING_AI_OPENAI_API_KEY environment variable
#             Cost: ~$0.00015 per 1K tokens (very cheap)
#
#   ollama  → Uses Ollama local models (llama3.2 + nomic-embed-text)
#             Requires: Ollama running on localhost:11434
#             Cost: Free, runs on your machine
#
# See docs/10-switching-llm-providers.md for full instructions.
spring.profiles.active=openai

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.agentic.docs=INFO
