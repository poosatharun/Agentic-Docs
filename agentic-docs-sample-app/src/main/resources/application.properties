server.port=8080

# ── Active LLM Profile ────────────────────────────────────────────────────────
# openai → Uses OpenAI API (requires SPRING_AI_OPENAI_API_KEY env var)
# ollama → Uses local Ollama (requires ollama serve running on localhost:11434)
spring.profiles.active=openai

# ── Agentic Docs ──────────────────────────────────────────────────────────────
# Enabled by default. Set to false to disable the RAG chat endpoint.
# agentic.docs.enabled=false

# ── Springdoc / Swagger UI ────────────────────────────────────────────────────
# Exclude Agentic Docs internal endpoints from Swagger UI so only
# the sample application's own REST endpoints are documented there.
springdoc.paths-to-exclude=/agentic-docs/api/**

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.agentic.docs=INFO
