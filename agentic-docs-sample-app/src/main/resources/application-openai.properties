# ══════════════════════════════════════════════════════════════════════════════
# PROVIDER: OpenAI  (cloud, paid)
# Profile : openai
#
# HOW TO ACTIVATE:
#   Set in application.properties → spring.profiles.active=openai
#   OR pass at runtime            → --spring.profiles.active=openai
#
# REQUIREMENTS:
#   Set environment variable: SPRING_AI_OPENAI_API_KEY=sk-...
#   Get a key at: https://platform.openai.com/api-keys
#
# COST (approximate):
#   Chat      : gpt-4o-mini  → ~$0.00015 per 1K input tokens
#   Embeddings: text-embedding-3-small → ~$0.00002 per 1K tokens
#   A typical session costs less than $0.01
# ══════════════════════════════════════════════════════════════════════════════

spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:your-openai-api-key-here}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small
