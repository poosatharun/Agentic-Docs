# ══════════════════════════════════════════════════════════════════════════════
# PROVIDER: Ollama  (local, free, offline)
# Profile : ollama
#
# HOW TO ACTIVATE:
#   Set in application.properties → spring.profiles.active=ollama
#   OR pass at runtime            → --spring.profiles.active=ollama
#
# REQUIREMENTS:
#   1. Install Ollama: https://ollama.com/download
#   2. Pull the required models (run these commands once):
#        ollama pull llama3.2
#        ollama pull nomic-embed-text
#   3. Ollama must be running before starting the app:
#        ollama serve
#      (Ollama auto-starts on most systems after install)
#
# COST: Free — runs entirely on your machine, no API key needed.
#
# HARDWARE:
#   llama3.2 (3B)     → ~2GB RAM, runs on most laptops
#   nomic-embed-text  → ~274MB RAM
# ══════════════════════════════════════════════════════════════════════════════

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.embedding.options.model=nomic-embed-text

# ── Performance tuning ────────────────────────────────────────────────────────
# Keep model loaded indefinitely — eliminates the 10-30s cold-start delay on
# every request.  Set to a duration (e.g. 10m) if RAM is a concern.
spring.ai.ollama.chat.options.keep-alive=-1

# Limit context window to 2048 tokens.  The RAG context for API docs is small,
# so a full 4096-token window just wastes time on inference overhead.
spring.ai.ollama.chat.options.num-ctx=2048

# Cap the maximum number of generated tokens.  API answers don't need essays;
# 512 tokens is ~350 words — plenty for any endpoint explanation or code snippet.
spring.ai.ollama.chat.options.num-predict=512

# Lower temperature = less random, slightly faster convergence on an answer.
spring.ai.ollama.chat.options.temperature=0.1


