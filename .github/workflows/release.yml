# ─────────────────────────────────────────────────────────────────────────────
# Agentic Docs — Maven Central Publish
#
# WHAT THIS FILE DOES:
#   Triggered when a GitHub Release is published.
#   Builds, signs, and uploads all publishable library artifacts to
#   Maven Central via the Sonatype Central Publishing Portal.
#
# PREREQUISITES (set once in Settings → Secrets and variables → Actions):
#   MAVEN_GPG_PRIVATE_KEY   — ASCII-armored GPG private key
#                             (export with: gpg --armor --export-secret-keys KEY_ID)
#   MAVEN_GPG_PASSPHRASE    — Passphrase protecting the GPG key
#   MAVEN_CENTRAL_USERNAME  — Sonatype Central Portal username (token prefix)
#   MAVEN_CENTRAL_TOKEN     — Sonatype Central Portal password (token value)
#
# HOW TO TRIGGER:
#   GitHub UI → Releases → Draft a new release → Publish release
#   Or via CLI: gh release create v1.0.0 --title "v1.0.0" --notes "..."
# ─────────────────────────────────────────────────────────────────────────────

name: Publish to Maven Central

on:
  release:
    types: [published]

jobs:
  publish:
    name: Sign & Publish (Java 21)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Java + Maven cache ────────────────────────────────────────────────
      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          # Import GPG key so maven-gpg-plugin can find it
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # ── 3. Write Sonatype credentials to ~/.m2/settings.xml ─────────────────
      - name: Configure Maven settings (Sonatype credentials)
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.MAVEN_CENTRAL_USERNAME }}",
              "password": "${{ secrets.MAVEN_CENTRAL_TOKEN }}"
            }]

      # ── 4. Deploy with release profile ──────────────────────────────────────
      # -P release activates:
      #   - maven-gpg-plugin  → signs all artifacts
      #   - central-publishing-maven-plugin → uploads to Sonatype Central Portal
      # apiscope-sample-app is automatically skipped (maven-deploy-plugin skip=true)
      - name: Deploy to Maven Central
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn clean deploy -P release -B --no-transfer-progress
